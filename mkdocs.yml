# MkDocs config for MPCP docs site (PR19)
site_name: MPCP
site_description: Machine Payment Control Protocol
site_url: https://naory.github.io/mpcp-service/
repo_url: https://github.com/naory/mpcp-service
repo_name: mpcp-service
edit_uri: edit/main/docs/

plugins:
  - search

extra:
  homepage: true
  protocol_version: "MPCP 1.0"

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: slate
      accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Overview:
    - What is MPCP?: overview/what-is-mpcp.md
    - Problem Statement: overview/problem-statement.md
    - Design Goals: overview/design-goals.md
    - Comparison with Agent Protocols: overview/comparison-with-agent-protocols.md
  - Architecture:
    - Authorization Chain: architecture/authorization-chain.md
    - System Model: architecture/system-model.md
    - Actors: architecture/actors.md
    - Artifact Lifecycle: architecture/artifact-lifecycle.md
    - Reference Flow: architecture/reference-flow.md
    - Implementation Roadmap: doc/architecture/MPCP_IMPLEMENTATION_ROADMAP.md
  - Protocol:
    - MPCP Spec: protocol/mpcp.md
    - Artifacts Overview: protocol/artifacts.md
    - PolicyGrant: protocol/PolicyGrant.md
    - SignedBudgetAuthorization: protocol/SignedBudgetAuthorization.md
    - SignedPaymentAuthorization: protocol/SignedPaymentAuthorization.md
    - SettlementIntent: protocol/SettlementIntent.md
    - SettlementIntentHash: protocol/SettlementIntentHash.md
    - FleetPolicyAuthorization: protocol/FleetPolicyAuthorization.md
    - Hashing: protocol/hashing.md
    - Verification: protocol/verification.md
    - Anchoring: protocol/anchoring.md
  - Scenarios:
    - EV Charging: scenarios/ev-charging.md
    - Parking: scenarios/parking.md
    - Machine Commerce: scenarios/machine-commerce.md
  - Implementation:
    - Verifier: implementation/verifier.md
    - SDK: implementation/sdk.md
    - Conformance: implementation/conformance.md
  - Guides:
    - Build a Machine Wallet: guides/build-a-machine-wallet.md
    - Fleet Payments: guides/fleet-payments.md
    - Dispute Resolution: guides/dispute-resolution.md
  - Examples:
    - Parking: examples/parking.md
    - Charging: examples/charging.md
    - Fleet: examples/fleet.md
  - Reference:
    - SDK: reference/sdk.md
    - Service API: reference/service-api.md
    - CLI: reference/cli.md
  - Diagrams:
    - Diagrams: diagrams/README.md
  - Animation Pack: animation/MPCP_ANIMATION_PACK.md

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences
